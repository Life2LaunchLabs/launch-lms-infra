services:
  launch-lms:
    image: ghcr.io/life2launchlabs/launch-lms:prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    env_file: .env
    volumes:
      - content_data:/app/api/content
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    image: ghcr.io/life2launchlabs/launch-lms:prod
    restart: "no"
    env_file: .env
    volumes:
      - content_data:/app/api/content
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -lc "cd /app/api && ./scripts/run_alembic_migrations.sh"

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: launchlms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: launchlms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchlms"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
  content_data:
